version: "3.8"

services:
  shibu-tutor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shibu-opc-tutor
    ports:
      - "3000:3000"
    volumes:
      - shibu-data:/app/data
    environment:
      - DATABASE_URL=file:./data/dev.db
      - NEXTAUTH_SECRET=shibu-docker-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  shibu-data:
